name: Build and Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'

env:
  REGISTRY: acrstudojo-dhfsdrfhf6a6bbg2.azurecr.io
  SERVICE_NAME: job-outreach-frontend
  IMAGE_TAG: ${{ github.sha }}
  NAMESPACE: studojo

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.AZURE_CLIENT_ID }}
          password: ${{ secrets.AZURE_CLIENT_SECRET }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.SERVICE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.SERVICE_NAME }}:latest
          build-args: |
            NEXT_PUBLIC_API_URL=https://api.studojo.com/v1/outreach
            NEXT_PUBLIC_AUTH_URL=https://api.studojo.com/v1
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.SERVICE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.SERVICE_NAME }}:buildcache,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Construct Azure Credentials
        id: azure_creds
        run: |
          if [ -z "${{ secrets.AZURE_CREDENTIALS }}" ]; then
            echo "creds<<EOF" >> $GITHUB_OUTPUT
            echo '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}' >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "creds<<EOF" >> $GITHUB_OUTPUT
            echo "${{ secrets.AZURE_CREDENTIALS }}" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ steps.azure_creds.outputs.creds }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "latest"

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group rg-studojo \
            --name studojo-aks \
            --overwrite-existing

      - name: Deploy to Kubernetes
        run: |
          kubectl set image deployment/${{ env.SERVICE_NAME }} \
            ${{ env.SERVICE_NAME }}=${{ env.REGISTRY }}/${{ env.SERVICE_NAME }}:${{ env.IMAGE_TAG }} \
            -n ${{ env.NAMESPACE }}
          kubectl rollout status deployment/${{ env.SERVICE_NAME }} \
            -n ${{ env.NAMESPACE }} --timeout=10m || {
            echo "Rollout failed or timed out. Checking pod status..."
            kubectl get pods -n ${{ env.NAMESPACE }} -l app=${{ env.SERVICE_NAME }} -o wide
            LATEST_POD=$(kubectl get pods -n ${{ env.NAMESPACE }} \
              -l app=${{ env.SERVICE_NAME }} \
              --sort-by=.metadata.creationTimestamp \
              -o jsonpath='{.items[-1].metadata.name}' 2>/dev/null || echo "")
            if [ -n "$LATEST_POD" ]; then
              kubectl get events -n ${{ env.NAMESPACE }} \
                --field-selector involvedObject.name=$LATEST_POD \
                --sort-by='.lastTimestamp' | tail -20 || true
              kubectl logs -n ${{ env.NAMESPACE }} $LATEST_POD --tail=50 || true
            fi
            exit 1
          }

      - name: Record deployment
        run: |
          curl -X POST https://api.studojo.com/v1/dev/deployments \
            -H "Content-Type: application/json" \
            -H "X-Deployment-Secret: ${{ secrets.DEPLOYMENT_SECRET }}" \
            -d '{
              "service": "${{ env.SERVICE_NAME }}",
              "version": "${{ env.IMAGE_TAG }}",
              "deployed_at": "'$(date -u +"%Y-%m-%dT%H:%M:%SZ")'",
              "deployed_by": "${{ github.actor }}",
              "status": "success",
              "workflow_run": ${{ github.run_id }}
            }' || echo "Failed to record deployment (non-critical)"
