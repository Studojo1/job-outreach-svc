name: Build and Deploy

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  REGISTRY: acrstudojo-dhfsdrfhf6a6bbg2.azurecr.io
  ACR_NAME: acrstudojo
  SERVICE_NAME: job-outreach-svc
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: |
          TOKEN=$(az acr login --name ${{ env.ACR_NAME }} --expose-token --output tsv --query accessToken)
          docker login ${{ env.REGISTRY }} -u 00000000-0000-0000-0000-000000000000 -p "$TOKEN"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.SERVICE_NAME }}:${{ env.IMAGE_TAG }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.SERVICE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.SERVICE_NAME }}:buildcache,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "latest"

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group rg-studojo \
            --name studojo-aks \
            --overwrite-existing

      - name: Deploy to Kubernetes
        run: |
          kubectl set image deployment/${{ env.SERVICE_NAME }} ${{ env.SERVICE_NAME }}=${{ env.REGISTRY }}/${{ env.SERVICE_NAME }}:${{ env.IMAGE_TAG }} -n studojo
          kubectl rollout status deployment/${{ env.SERVICE_NAME }} -n studojo --timeout=10m || {
            echo "Rollout failed or timed out. Checking pod status..."
            kubectl get pods -n studojo -l app=${{ env.SERVICE_NAME }} -o wide
            LATEST_POD=$(kubectl get pods -n studojo -l app=${{ env.SERVICE_NAME }} --sort-by=.metadata.creationTimestamp -o jsonpath='{.items[-1].metadata.name}' 2>/dev/null || echo "")
            if [ -n "$LATEST_POD" ]; then
              kubectl get events -n studojo --field-selector involvedObject.name=$LATEST_POD --sort-by='.lastTimestamp' | tail -20 || true
              kubectl logs -n studojo $LATEST_POD --tail=50 || true
            fi
            exit 1
          }

      - name: Record deployment
        run: |
          curl -X POST https://api.studojo.com/v1/dev/deployments \
            -H "Content-Type: application/json" \
            -H "X-Deployment-Secret: ${{ secrets.DEPLOYMENT_SECRET }}" \
            -d '{
              "service": "${{ env.SERVICE_NAME }}",
              "version": "${{ env.IMAGE_TAG }}",
              "deployed_at": "'$(date -u +"%Y-%m-%dT%H:%M:%SZ")'",
              "deployed_by": "${{ github.actor }}",
              "status": "success",
              "workflow_run": ${{ github.run_id }}
            }' || echo "Failed to record deployment (non-critical)"
